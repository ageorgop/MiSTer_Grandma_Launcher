<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grandma Launcher Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; max-width: 900px; margin: 0 auto; }
  h1 { margin-bottom: 20px; color: #80a0ff; }
  h2 { margin: 20px 0 10px; color: #aaa; font-size: 1.1em; }
  .game-list { list-style: none; }
  .game-list li { display: flex; align-items: center; gap: 12px; padding: 10px 14px; margin: 4px 0; background: #2a2a4e; border-radius: 8px; }
  .game-list li .name { flex: 1; font-size: 1.1em; }
  .game-list li .system { color: #888; font-size: 0.85em; }
  button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
  .btn-add { background: #4a6; color: white; }
  .btn-remove { background: #a44; color: white; }
  .btn-save { background: #48f; color: white; font-size: 1.1em; padding: 10px 24px; margin-top: 20px; }
  .btn-up, .btn-down { background: #555; color: white; font-size: 0.8em; padding: 4px 8px; }
  .available { max-height: 400px; overflow-y: auto; border: 1px solid #444; border-radius: 8px; padding: 8px; margin-bottom: 20px; }
  .available li { cursor: pointer; }
  .available li:hover { background: #3a3a6e; }
  .status { margin-top: 10px; padding: 10px; border-radius: 6px; display: none; }
  .status.ok { display: block; background: #2a4a2a; color: #8f8; }
  .status.err { display: block; background: #4a2a2a; color: #f88; }
  .search { width: 100%; padding: 8px 12px; margin-bottom: 10px; border: 1px solid #555; border-radius: 6px; background: #222; color: #eee; font-size: 1em; }
  .art-thumb { width: 50px; height: 50px; object-fit: contain; border-radius: 4px; cursor: pointer; background: #3a3a5e; flex-shrink: 0; }
  .art-thumb:hover { opacity: 0.7; }
  .art-thumb-placeholder { width: 50px; height: 50px; border-radius: 4px; cursor: pointer; background: #3a3a5e; display: flex; align-items: center; justify-content: center; font-size: 0.55em; color: #666; flex-shrink: 0; }
  .art-thumb-placeholder:hover { background: #4a4a6e; }
  .btn-fetch-art { background: #a86; color: white; font-size: 1em; padding: 8px 18px; margin-top: 10px; margin-left: 10px; }
</style>
</head>
<body>
<h1>Grandma Launcher</h1>
<input type="file" id="artPicker" accept="image/png" style="display:none">

<h2>Current Game Lineup</h2>
<ul class="game-list" id="lineup"></ul>
<button class="btn-save" onclick="saveGames()">Save &amp; Apply</button>
<button class="btn-fetch-art" id="fetchArtBtn" onclick="fetchMissingArt()">Fetch Missing Art</button>
<div id="status" class="status"></div>
<div id="artStatus" class="status"></div>

<h2>Add Games from Arcade Library</h2>
<input type="text" class="search" id="search" placeholder="Search arcade games..." oninput="filterAvailable()">
<div class="available">
  <ul class="game-list" id="available"></ul>
</div>

<script>
let games = [];
let available = [];
let artListingCache = null;

const LIBRETRO_BOXART_URL = 'https://thumbnails.libretro.com/MAME/Named_Boxarts/';
const PROXY_BOXART_URL = '/api/art-proxy/MAME/Named_Boxarts/';
let artBaseUrl = PROXY_BOXART_URL;

async function load() {
  const [gamesRes, mraRes] = await Promise.all([
    fetch('/api/games'),
    fetch('/api/available-mra')
  ]);
  const config = await gamesRes.json();
  games = config.games || [];
  available = await mraRes.json();
  renderLineup();
  renderAvailable();
  fetchArtListing();
}

async function fetchArtListing() {
  // Try direct first (in case CORS is ever enabled), fall back to proxy
  for (const baseUrl of [LIBRETRO_BOXART_URL, PROXY_BOXART_URL]) {
    try {
      const res = await fetch(baseUrl);
      if (!res.ok) continue;
      const html = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const links = doc.querySelectorAll('a[href$=".png"]');
      if (links.length === 0) continue;
      artListingCache = [];
      for (const a of links) {
        const filename = decodeURIComponent(a.getAttribute('href'));
        const prefix = extractPrefix(filename.replace(/\.png$/, ''));
        artListingCache.push({ filename, prefix });
      }
      artBaseUrl = baseUrl;
      return;
    } catch (e) {
      continue;
    }
  }
  artListingCache = null;
}

function extractPrefix(name) {
  const parenIdx = name.indexOf('(');
  const base = parenIdx >= 0 ? name.substring(0, parenIdx) : name;
  return base.trim();
}

function findArtMatch(gameName) {
  if (!artListingCache) return null;
  const prefix = extractPrefix(gameName);
  if (!prefix) return null;
  const matches = artListingCache.filter(entry => entry.prefix === prefix);
  if (matches.length === 0) return null;
  if (matches.length === 1) return matches[0].filename;
  matches.sort((a, b) => a.filename.length - b.filename.length);
  return matches[0].filename;
}

async function fetchArtForGame(gameId, gameName) {
  const match = findArtMatch(gameName);
  if (!match) return;
  updateArtStatus(gameId, 'fetching');
  try {
    const url = artBaseUrl + encodeURIComponent(match);
    const res = await fetch(url);
    if (!res.ok) return;
    const blob = await res.blob();
    if (blob.size === 0 || blob.size > 2 * 1024 * 1024) return;
    const uploadRes = await fetch('/api/art/' + gameId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: blob
    });
    if (uploadRes.ok) {
      updateArtStatus(gameId, 'found');
    }
  } catch (e) {
    // Silently fail
  }
}

function updateArtStatus(gameId, status) {
  if (status === 'found') {
    loadThumb(gameId);
  }
}

async function loadThumb(gameId) {
  const el = document.getElementById('art-' + gameId);
  if (!el) return;
  try {
    const res = await fetch('/api/art/' + gameId + '?t=' + Date.now());
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const newImg = document.createElement('img');
    newImg.className = 'art-thumb';
    newImg.id = 'art-' + gameId;
    newImg.src = url;
    newImg.title = 'Click to change art';
    newImg.onclick = function() { pickArt(gameId); };
    el.replaceWith(newImg);
  } catch (e) {
    // Keep placeholder
  }
}

let pickArtTargetId = null;

function pickArt(gameId) {
  pickArtTargetId = gameId;
  document.getElementById('artPicker').click();
}

document.getElementById('artPicker').addEventListener('change', async function() {
  const file = this.files[0];
  this.value = '';
  if (!file || !pickArtTargetId) return;
  const gameId = pickArtTargetId;
  pickArtTargetId = null;
  try {
    const res = await fetch('/api/art/' + gameId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: file
    });
    const data = await res.json();
    if (data.ok) {
      loadThumb(gameId);
    } else {
      alert('Upload failed: ' + (data.error || 'Unknown error'));
    }
  } catch (e) {
    alert('Upload failed: ' + e.message);
  }
});

async function fetchMissingArt() {
  if (!artListingCache) {
    const artStatus = document.getElementById('artStatus');
    artStatus.className = 'status err';
    artStatus.textContent = 'Art listing not available. Check your internet connection.';
    return;
  }

  const btn = document.getElementById('fetchArtBtn');
  btn.disabled = true;
  const artStatus = document.getElementById('artStatus');

  try {
    const toFetch = [];
    for (const game of games) {
      const res = await fetch('/api/art-exists/' + game.id);
      const data = await res.json();
      if (!data.exists) {
        toFetch.push(game);
      }
    }

    if (toFetch.length === 0) {
      artStatus.className = 'status ok';
      artStatus.textContent = 'All games already have art!';
      return;
    }

    let fetched = 0;
    for (const game of toFetch) {
      fetched++;
      artStatus.className = 'status ok';
      artStatus.textContent = `Fetching art ${fetched}/${toFetch.length}: ${game.name}...`;
      await fetchArtForGame(game.id, game.name);
    }

    artStatus.className = 'status ok';
    artStatus.textContent = `Done! Attempted art fetch for ${toFetch.length} game(s).`;
  } catch (e) {
    artStatus.className = 'status err';
    artStatus.textContent = 'Error fetching art: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function renderLineup() {
  const el = document.getElementById('lineup');
  el.innerHTML = games.map((g, i) => `
    <li>
      <button class="btn-up" onclick="moveUp(${i})">&uarr;</button>
      <button class="btn-down" onclick="moveDown(${i})">&darr;</button>
      <div class="art-thumb-placeholder" id="art-${esc(g.id)}" onclick="pickArt('${esc(g.id)}')" title="Click to upload art">No Art</div>
      <span class="name">${esc(g.name)}</span>
      <span class="system">${esc(g.system)}</span>
      <button class="btn-remove" onclick="removeGame(${i})">Remove</button>
    </li>
  `).join('');
  games.forEach(g => loadThumb(g.id));
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderAvailable() {
  const search = document.getElementById('search').value.toLowerCase();
  const inLineup = new Set(games.map(g => g.launch));
  const filtered = available.filter(m =>
    !inLineup.has(m.path) && m.name.toLowerCase().includes(search)
  );
  const el = document.getElementById('available');
  el.innerHTML = filtered.map(m => `
    <li onclick="addGame(${JSON.stringify(m.id).replace(/"/g, '&quot;')}, ${JSON.stringify(m.name).replace(/"/g, '&quot;')}, ${JSON.stringify(m.path).replace(/"/g, '&quot;')})">
      <span class="name">${esc(m.name)}</span>
      <button class="btn-add">Add</button>
    </li>
  `).join('');
}

function addGame(id, name, path) {
  games.push({ id, name, system: 'arcade', launch: path, art: 'assets/boxart/' + id + '.png' });
  renderLineup();
  renderAvailable();
  fetchArtForGame(id, name);
}

function removeGame(i) {
  games.splice(i, 1);
  renderLineup();
  renderAvailable();
}

function moveUp(i) {
  if (i === 0) return;
  [games[i-1], games[i]] = [games[i], games[i-1]];
  renderLineup();
}

function moveDown(i) {
  if (i >= games.length - 1) return;
  [games[i], games[i+1]] = [games[i+1], games[i]];
  renderLineup();
}

function filterAvailable() { renderAvailable(); }

async function saveGames() {
  const status = document.getElementById('status');
  try {
    const res = await fetch('/api/games', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ schema: 1, games })
    });
    const data = await res.json();
    if (data.ok) {
      status.className = 'status ok';
      status.textContent = 'Saved! Games will appear next time the launcher starts.';
    } else {
      status.className = 'status err';
      status.textContent = 'Error: ' + (data.error || 'Unknown');
    }
  } catch (e) {
    status.className = 'status err';
    status.textContent = 'Error: ' + e.message;
  }
}

load();
</script>
</body>
</html>
